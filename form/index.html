<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>동아리 신청 테스트 폼</title>
  <style>
    body {
      background: #111;
      color: #f5f5f5;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .wrapper {
      max-width: 480px;
      margin: 40px auto;
      padding: 24px 28px;
      background: #1e1e1e;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    h1 { font-size: 20px; margin-bottom: 16px; }
    .desc { font-size: 13px; color: #aaa; margin-bottom: 20px; }
    label { display: block; font-size: 13px; margin-bottom: 4px; }
    input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #111;
      color: #f5f5f5;
      font-size: 14px;
      margin-bottom: 12px;
    }
    button {
      width: 100%;
      padding: 10px 0;
      border-radius: 999px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      background: #4f46e5;
      color: white;
    }
    button:hover { opacity: .9; }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>동아리 신청 하기 (테스트)</h1>
    <p class="desc">
      학번 / 학과 / 이름 / 이메일 / 전화번호를 입력하고 제출하면<br />
      FastAPI 서버의 <code>/test/apply</code> 로 전송됩니다.
    </p>

    <!-- ✅ 여기부터가 실제 데이터를 기입하는 부분 -->
    <form method="post" action="/test/apply">
      <label>학번</label>
      <input type="text" name="student_id" required />

      <label>학과</label>
      <input type="text" name="department" required />

      <label>이름</label>
      <input type="text" name="name" required />

      <label>이메일</label>
      <input type="email" name="email" required />

      <label>전화번호</label>
      <input type="tel" name="phone" required />

      <button type="submit">테스트로 DB에 저장하기</button>
    </form>
    <!-- ✅ 여기까지 -->
  </div>
</body>
</html>
