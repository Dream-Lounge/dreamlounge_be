<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테스트 신청 폼</title>
    <style>
        body {
            background: #111;
            color: #f5f5f5;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
        }
        h2 { color: #60a5fa; }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #a3e635;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #444;
            background: #222;
            color: #f5f5f5;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            background: #60a5fa;
            color: #111;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        button:hover { background: #3b82f6; }
        button:disabled {
            background: #444;
            cursor: not-allowed;
        }
        .message {
            padding: 16px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }
        .message.success {
            background: #065f46;
            border: 1px solid #10b981;
        }
        .message.error {
            background: #7f1d1d;
            border: 1px solid #ef4444;
        }
        .message.show { display: block; }
        .data-info {
            background: #1e293b;
            padding: 12px;
            border-radius: 4px;
            margin-top: 12px;
        }
        .data-info p {
            margin: 6px 0;
        }
        a {
            color: #60a5fa;
            text-decoration: none;
        }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h2>✨ 테스트 신청 폼</h2>
    
    <div id="message" class="message"></div>
    
    <form id="applicationForm">
        <div class="form-group">
            <label for="student_id">학번 *</label>
            <input type="text" id="student_id" name="student_id" required>
        </div>
        
        <div class="form-group">
            <label for="department">학과 *</label>
            <input type="text" id="department" name="department" required>
        </div>
        
        <div class="form-group">
            <label for="name">이름 *</label>
            <input type="text" id="name" name="name" required>
        </div>
        
        <div class="form-group">
            <label for="email">이메일 *</label>
            <input type="email" id="email" name="email" required>
        </div>
        
        <div class="form-group">
            <label for="phone">전화번호 *</label>
            <input type="tel" id="phone" name="phone" required>
        </div>
        
        <button type="submit" id="submitBtn">신청하기</button>
    </form>

    <script>
        const form = document.getElementById('applicationForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        // ✅ HTML 이스케이프 함수 (XSS 방지)
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // 버튼 비활성화
            submitBtn.disabled = true;
            submitBtn.textContent = '처리 중...';
            
            // 폼 데이터 수집
            const formData = new FormData(form);
            
            try {
                const response = await fetch('/test/apply', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // ✅ 성공 메시지 - JSON 데이터를 안전하게 이스케이프
                    messageDiv.className = 'message success show';
                    messageDiv.innerHTML = `
                        <h3>✅ ${escapeHtml(result.message)}</h3>
                        <div class="data-info">
                            <p><strong>학번:</strong> ${escapeHtml(String(result.data.student_id))}</p>
                            <p><strong>학과:</strong> ${escapeHtml(result.data.department)}</p>
                            <p><strong>이름:</strong> ${escapeHtml(result.data.name)}</p>
                            <p><strong>이메일:</strong> ${escapeHtml(result.data.email)}</p>
                            <p><strong>전화번호:</strong> ${escapeHtml(result.data.phone)}</p>
                            <p><strong>등록일시:</strong> ${escapeHtml(new Date(result.data.created_at).toLocaleString('ko-KR'))}</p>
                        </div>
                        <p style="margin-top: 16px;">
                            <a href="/db/tables/test_applications/data">DB 데이터 확인하기</a>
                        </p>
                    `;
                    
                    // 폼 초기화
                    form.reset();
                } else {
                    // ✅ 에러 메시지 - 안전하게 이스케이프
                    messageDiv.className = 'message error show';
                    messageDiv.innerHTML = `
                        <h3>⚠️ 신청 실패</h3>
                        <p>${escapeHtml(result.message)}</p>
                    `;
                }
            } catch (error) {
                // 네트워크 에러 등
                messageDiv.className = 'message error show';
                messageDiv.innerHTML = `
                    <h3>⚠️ 오류 발생</h3>
                    <p>서버와 통신 중 오류가 발생했습니다.</p>
                `;
                console.error('Error:', error);
            } finally {
                // 버튼 활성화
                submitBtn.disabled = false;
                submitBtn.textContent = '신청하기';
                
                // 메시지로 스크롤
                messageDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        });
    </script>
</body>
</html>
