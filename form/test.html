<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>DreamLounge Test Lab</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; max-width: 600px; margin: 0 auto; }
        section { border: 1px solid #ddd; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        input { display: block; width: 95%; margin-bottom: 10px; padding: 8px; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
        .result { background: #f4f4f4; padding: 10px; margin-top: 10px; font-size: 0.9em; word-break: break-all; min-height: 20px; }
    </style>
</head>
<body>
    <h1>DreamLounge Auth Test</h1>

    <!-- 1. 회원가입 -->
    <section>
        <h3>1. 회원가입 (Signup)</h3>
        <input type="email" id="signupEmail" placeholder="학교 이메일 (@cju.ac.kr)">
        <input type="password" id="signupPw" placeholder="비밀번호 (6자 이상)">
        <button onclick="signup()">가입 신청</button>
        <div id="signupRes" class="result">결과가 여기에 표시됩니다.</div>
    </section>

    <!-- 2. OTP 인증 -->
    <section>
        <h3>2. 이메일 인증 (Verify OTP)</h3>
        <input type="email" id="verifyEmail" placeholder="이메일">
        <input type="text" id="verifyCode" placeholder="메일로 온 8자리 번호">
        <button onclick="verify()">인증 완료</button>
        <div id="verifyRes" class="result">성공 시 User ID를 복사해두세요.</div>
    </section>

    <!-- 3. 로그인 -->
    <section>
        <h3>3. 로그인 (Login)</h3>
        <input type="email" id="loginEmail" placeholder="이메일">
        <input type="password" id="loginPw" placeholder="비밀번호">
        <button onclick="login()">로그인</button>
        <div id="loginRes" class="result">성공 시 Access Token이 발급됩니다.</div>
    </section>

    <!-- 4. 프로필 생성 -->
    <section>
        <h3>4. 프로필 저장 (Profile)</h3>
        <input type="text" id="profId" placeholder="User ID (로그인 결과에서 복사)">
        <input type="text" id="profName" placeholder="이름">
        <input type="text" id="profSid" placeholder="학번">
        <input type="text" id="profDept" placeholder="학과">
        <button onclick="saveProfile()">프로필 저장</button>
        <div id="profRes" class="result"></div>
    </section>

    <script>
        const API_URL = "http://127.0.0.1:8000";

        async function signup() {
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPw').value;
            const res = await fetch(`${API_URL}/auth/signup`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            document.getElementById('signupRes').innerText = JSON.stringify(data);
        }

        async function verify() {
            const email = document.getElementById('verifyEmail').value;
            const token = document.getElementById('verifyCode').value;
            const res = await fetch(`${API_URL}/auth/verify-otp`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, token })
            });
            const data = await res.json();
            document.getElementById('verifyRes').innerText = JSON.stringify(data);
        }

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPw').value;
            const res = await fetch(`${API_URL}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            document.getElementById('loginRes').innerText = JSON.stringify(data);
        }

        async function saveProfile() {
            const user_id = document.getElementById('profId').value;
            const name = document.getElementById('profName').value;
            const student_id = document.getElementById('profSid').value;
            const department = document.getElementById('profDept').value;
            const res = await fetch(`${API_URL}/auth/profile`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id, name, student_id, department })
            });
            const data = await res.json();
            document.getElementById('profRes').innerText = JSON.stringify(data);
        }
    </script>
</body>
</html>
