<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            opacity: 0.9;
        }
        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        /* ✅ 추가: 성공 메시지 */
        .success {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .token-info {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            font-size: 13px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>로그인</h1>
        
        <div id="errorMessage" class="error"></div>
        <div id="successMessage" class="success"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>학번</label>
                <input type="number" id="studentId" placeholder="20231234" required>
            </div>

            <div class="form-group">
                <label>비밀번호</label>
                <input type="password" id="password" placeholder="비밀번호" required>
            </div>

            <button type="submit">로그인</button>
        </form>

        <p style="text-align: center; margin-top: 20px;">
            <a href="/debug/register-form" style="color: #667eea;">회원가입</a>
        </p>
    </div>

    <script>
        // ✅ 토큰 만료 시간 계산
        function getTokenExpireTime(expiresIn) {
            const now = new Date();
            const expireTime = new Date(now.getTime() + expiresIn * 1000);
            return expireTime;
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                student_id: parseInt(document.getElementById('studentId').value),
                password: document.getElementById('password').value
            };

            try {
                console.log('📤 로그인 요청 중...');
                
                const response = await fetch('/members/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (response.ok) {
                    console.log('✅ 로그인 성공!', data);
                    
                    // ✅ JWT 토큰 저장
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('token_type', data.token_type);
                    localStorage.setItem('user_info', JSON.stringify(data.user));
                    
                    // ✅ 토큰 만료 시간 저장
                    const expireTime = getTokenExpireTime(data.expires_in);
                    localStorage.setItem('token_expire_time', expireTime.toISOString());
                    
                    console.log('💾 토큰 저장 완료');
                    console.log('📅 만료 시간:', expireTime.toLocaleString('ko-KR'));
                    console.log('⏱️ 유효 시간:', Math.floor(data.expires_in / 60), '분');
                    
                    // ✅ 성공 메시지 표시
                    const successMessage = document.getElementById('successMessage');
                    successMessage.innerHTML = `
                        <strong>✅ 로그인 성공!</strong><br>
                        ${data.user.name}님 환영합니다.<br>
                        <div class="token-info">
                            토큰 만료: ${expireTime.toLocaleString('ko-KR')}<br>
                            유효 시간: ${Math.floor(data.expires_in / 60)}분
                        </div>
                        <p style="margin-top: 10px;">2초 후 테스트 페이지로 이동합니다...</p>
                    `;
                    successMessage.style.display = 'block';
                    
                    // ✅ 2초 후 테스트 페이지로 이동
                    setTimeout(() => {
                        window.location.href = '/debug/test-page';
                    }, 2000);
                } else {
                    console.log('❌ 로그인 실패:', data);
                    const errorMessage = document.getElementById('errorMessage');
                    errorMessage.textContent = data.detail || '로그인에 실패했습니다.';
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                console.error('❌ Error:', error);
                alert('로그인 중 오류가 발생했습니다.');
            }
        });
    </script>
</body>
</html>
