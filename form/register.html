<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            opacity: 0.9;
        }
        .error {
            color: red;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>회원가입</h1>
        
        <div id="successMessage" class="success"></div>
        
        <form id="registerForm">
            <div class="form-group">
                <label>학번 *</label>
                <input type="number" id="studentId" placeholder="20231234" required>
                <div class="error" id="studentIdError"></div>
            </div>

            <div class="form-group">
                <label>이름 *</label>
                <input type="text" id="name" placeholder="홍길동" required>
            </div>

            <div class="form-group">
                <label>학과</label>
                <input type="text" id="department" placeholder="컴퓨터공학과">
            </div>

            <div class="form-group">
                <label>전화번호</label>
                <input type="tel" id="phone" placeholder="010-1234-5678">
            </div>

            <div class="form-group">
                <label>비밀번호 *</label>
                <input type="password" id="password" placeholder="8자 이상, 영문+숫자" required>
            </div>

            <div class="form-group">
                <label>비밀번호 확인 *</label>
                <input type="password" id="passwordConfirm" placeholder="비밀번호 다시 입력" required>
            </div>

            <button type="submit">회원가입</button>
        </form>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                student_id: parseInt(document.getElementById('studentId').value),
                name: document.getElementById('name').value,
                department: document.getElementById('department').value || null,
                phone: document.getElementById('phone').value || null,
                password: document.getElementById('password').value,
                password_confirm: document.getElementById('passwordConfirm').value
            };

            try {
                const response = await fetch('/members/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (response.ok) {
                    const successMessage = document.getElementById('successMessage');
                    successMessage.textContent = `✅ 회원가입 성공! ${data.name}님 환영합니다.`;
                    successMessage.style.display = 'block';
                    
                    document.getElementById('registerForm').reset();
                    
                    setTimeout(() => {
                        window.location.href = '/debug/login-form';
                    }, 2000);
                } else {
                    alert(JSON.stringify(data.detail));
                }
            } catch (error) {
                console.error('Error:', error);
                alert('회원가입 중 오류가 발생했습니다.');
            }
        });
    </script>
</body>
</html>
